<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */



    h1 {
        color: white;
        margin-bottom: 10px;
    }

    h2 {
        margin-top: 30px;
        color: white;
    }


    #counselor {
        border: 5px solid white;
        margin: auto;
        border-radius: 50%;
        width: 100px;



    }

    #prophet {
        border: 5px solid white;
        margin: auto;
        border-radius: 50%;
        width: 100px;
        height: 140px;
        width: 120px



    }

    img {
        border: 5px solid white;
        margin: auto;
        border-radius: 50%;
        width: 100px;
    }

    #twelve_apostles {

    display: grid;
    grid-template-columns: repeat(4, 120px);
    gap: 20px;
    justify-content: center;
    margin-bottom: 20px;

    }
    
#twelve_apostles img {
    width: 120px;
    height: auto;
    display: block;
    

}



    #background {
        background-image: url("images/christus.webp");
        border: 5px solid black;
        margin: auto;
        border-radius: 20px;
        width: 90%;
        height: 50%;
        text-align: center;
        background-repeat: no-repeat;
        background-position: top;
        background-position: 30% 30%;
    }

    </style>
</head>
<body>
    <div id="background">
        <h1>First Presidency</h1>
        <div id="first_presidency">
            <img id="counselor" src="images/eyring.webp" alt="Henry B. Eyring">

            <img id="prophet" src="images/oaks.webp" alt="Dallin H. Oaks">

            <img id="counselor" src="images/christofferson.webp" alt="christofferson">

        </div>

        <h2>Quorum of the Twelve Apostles</h2>

        <div id="twelve_apostles">
            <img src="images/holland.webp" alt="">
            <img src="images/uchtdorf.webp" alt="">
            <img src="images/bednar.webp" alt="">
            <img src="images/cook.webp" alt="">
            <img src="images/anderson.webp" alt="">
            <img src="images/rasband.webp" alt="">
            <img src="images/stevenson.webp" alt="">
            <img src="images/renlund.webp" alt="">
            <img src="images/gong.webp" alt="">
            <img src="images/soares.webp" alt="">
            <img src="images/kearon.webp" alt="">
            <img src="images/causse.webp" alt="">


        </div>
        

    </div>


</body>
</html>
